<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Фитиль</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #050505;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
      }
      .kenney-btn {
        border-style: solid;
        border-width: 14px;
        border-image-source: url(/ui/button_grey.png);
        border-image-slice: 20 fill;
        border-image-width: 14px;
        background: transparent;
        color: #f0ead8;
        font: 13px 'Courier New', monospace;
        padding: 6px 8px;
        cursor: pointer;
      }
      .kenney-btn:disabled {
        filter: grayscale(0.6) brightness(0.6);
      }
      .kenney-btn-primary {
        border-image-source: url(/ui/button_red.png);
      }
      .kenney-btn:active:not(:disabled) {
        filter: brightness(0.85);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
