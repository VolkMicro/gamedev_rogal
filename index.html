<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Фитиль</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #050505;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .kenney-btn {
        border-style: solid;
        border-width: 14px;
        border-image-source: url(/ui/button_grey.png);
        border-image-slice: 20 fill;
        border-image-width: 14px;
        background: transparent;
        /* Dark text on the light Kenney panel — the old light-on-light was
           unreadable on real screens (reported: "шрифт с цветом уебанские"). */
        color: #2a2118;
        font: bold 14px 'Courier New', monospace;
        padding: 6px 8px;
        cursor: pointer;
      }
      .kenney-btn:disabled {
        /* Dim, but keep text legible — full grayscale+brightness made
           disabled buttons melt into the dark background entirely. */
        filter: brightness(0.78);
        opacity: 0.75;
      }
      .kenney-btn-primary {
        border-image-source: url(/ui/button_red.png);
      }
      .kenney-btn:active:not(:disabled) {
        filter: brightness(0.85);
      }
      /* The game is designed for landscape. Telegram's phone clients never
         rotate their own UI, so instead of prompting the player to rotate
         (a dead end — the old #rotate-prompt overlay), src/orientation.ts
         rotates the whole page 90° via a transform on <body> whenever the
         viewport is portrait ("fake landscape"). */
      /* Campfire glow behind the camp hub — see src/meta/camp.ts. */
      @keyframes campfire-flicker {
        0%,
        100% {
          opacity: 0.5;
          transform: translateX(-50%) scale(1);
        }
        45% {
          opacity: 0.72;
          transform: translateX(-50%) scale(1.06);
        }
        70% {
          opacity: 0.58;
          transform: translateX(-50%) scale(0.97);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
